server {
    listen 80;
    server_name site1.local;

    root /var/www/site1;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}

server {
    listen 443 ssl;
    server_name site1.local;

    root /var/www/site1;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    ssl_certificate     /etc/nginx/certs/site1.crt;
    ssl_certificate_key /etc/nginx/certs/site1.key;
}
