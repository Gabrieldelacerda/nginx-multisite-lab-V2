services:
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: nginx-multisite
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx:/etc/nginx/conf.d:ro
      - ./sites:/var/www:ro
      - ./certs:/etc/nginx/certs:ro
    restart: unless-stopped
