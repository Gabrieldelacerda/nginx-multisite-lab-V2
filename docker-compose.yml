version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: nginx-multisite
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./sites:/var/www:ro
      - ./certs:/etc/nginx/certs:ro
    restart: unless-stopped
