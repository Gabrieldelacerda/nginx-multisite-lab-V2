version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: nginx-multisite
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./sites:/usr/share/nginx/html
      - ./certbot/www:/var/www/certbot   # ✅ shared challenge dir
      - ./certs:/etc/letsencrypt
    depends_on:
      - certbot

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/www:/var/www/certbot   # ✅ SAME path as nginx
      - ./certs:/etc/letsencrypt
