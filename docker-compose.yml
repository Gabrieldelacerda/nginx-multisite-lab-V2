version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: nginx-multisite
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./sites:/usr/share/nginx/html:ro
    restart: unless-stopped
