- hosts: web
  become: yes

  tasks:

    - name: Create project directory
      file:
        path: /home/ec2-user/nginx-multisite-lab
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: '0755'

    - name: Copy docker-compose file
      copy:
        src: ../docker-compose.yml
        dest: /home/ec2-user/nginx-multisite-lab/docker-compose.yml

    - name: Copy nginx config folder
      copy:
        src: ../nginx/
        dest: /home/ec2-user/nginx-multisite-lab/nginx/

    - name: Copy sites folder
      copy:
        src: ../sites/
        dest: /home/ec2-user/nginx-multisite-lab/sites/

    - name: Run Docker Compose
      command: /usr/local/bin/docker-compose up -d
      args:
        chdir: /home/ec2-user/nginx-multisite-lab
