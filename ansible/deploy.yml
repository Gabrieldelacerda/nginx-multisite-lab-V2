---
- name: Deploy Nginx Multisite Stack to EC2
  hosts: web
  become: true

  vars:
    project_path: /home/ec2-user/nginx-multisite-lab

  tasks:

    - name: Install Docker
      yum:
        name: docker
        state: present

    - name: Install Docker Compose
      get_url:
        url: https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64
        dest: /usr/local/bin/docker-compose
        mode: '0755'

    - name: Start and enable Docker
      service:
        name: docker
        state: started
        enabled: true

    - name: Add ec2-user to docker group
      user:
        name: ec2-user
        groups: docker
        append: yes

    - name: Create project directory
      file:
        path: "{{ project_path }}"
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: '0755'

    - name: Copy docker-compose file
      copy:
        src: ../docker-compose.yml
        dest: "{{ project_path }}/docker-compose.yml"

    - name: Copy nginx config
      copy:
        src: ../nginx/
        dest: "{{ project_path }}/nginx/"

    - name: Sync sites (force update)
      synchronize:
        src: ../sites/
        dest: "{{ project_path }}/sites/"
        recursive: yes
        delete: yes

    - name: Copy certs
      copy:
        src: ../certs/
        dest: "{{ project_path }}/certs/"

    - name: Stop containers
      command: /usr/local/bin/docker-compose down
      args:
        chdir: "{{ project_path }}"
      ignore_errors: yes

    - name: Start containers fresh
      command: /usr/local/bin/docker-compose up -d
      args:
        chdir: "{{ project_path }}"
